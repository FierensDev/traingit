name: Bug report
description: Signaler un problème
title: "[BUG]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description du bug
      description: Explique clairement le problème
      placeholder: "Le problème apparaît quand..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Étapes pour reproduire
      description: Liste les étapes
      placeholder: |
        1. Aller à...
        2. Cliquer sur...
        3. Voir l'erreur
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportement attendu
      placeholder: "Ce qui devrait se passer"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Comportement actuel
      placeholder: "Ce qui se passe réellement"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "v1.2.3"

  - type: textarea
    id: context
    attributes:
      label: Contexte additionnel
      description: Logs, screenshots, etc.